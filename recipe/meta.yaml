{% set version = "2.3.2.post1" %}

package:
  name: soupsieve
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/s/soupsieve/soupsieve-{{ version }}.tar.gz
  sha256: fc53893b3da2c33de295667a0e19f078c14bf86544af307354de5fcf12a3f30d

build:
  number: 0
  skip: True  # [py<37]
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - hatchling >=0.21.1
    - pip
    - python
  run:
    - python

test:
  imports:
    - soupsieve
  requires:
    - python <3.10
    - pip
    - beautifulsoup4
  commands:
    - pip check

about:
  home: http://facelessuser.github.io/soupsieve
  license: MIT
  license_family: MIT
  license_file: LICENSE.md
  summary: A modern CSS selector implementation for BeautifulSoup
  dev_url: https://github.com/facelessuser/soupsieve
  doc_url: https://facelessuser.github.io/soupsieve/

extra:
  recipe-maintainers:
    - jschueller
