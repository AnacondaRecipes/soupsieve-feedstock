{% set version = "2.4" %}

package:
  name: soupsieve
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/s/soupsieve/soupsieve-{{ version }}.tar.gz
  sha256: e28dba9ca6c7c00173e34e4ba57448f0688bb681b7c5e8bf4971daafc093d69a

build:
  number: 1
  # trigger 1
  skip: True  # [py<37]
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - hatchling 1.18
    - pip
    - python
    - wheel
  run:
    - python

test:
  imports:
    - soupsieve
    - bs4
  requires:
    - pip
    - beautifulsoup4
  commands:
    - pip check

about:
  home: https://facelessuser.github.io/soupsieve
  license: MIT
  license_family: MIT
  license_file: LICENSE.md
  summary: A modern CSS selector implementation for BeautifulSoup
  description: |
      Soup Sieve is a CSS selector library designed to be used with Beautiful Soup 4.
      It aims to provide selecting, matching, and filtering using modern CSS selectors.
      Soup Sieve currently provides selectors from the CSS level 1 specifications up
      through the latest CSS level 4 drafts and beyond (though some are not yet implemented).
  dev_url: https://github.com/facelessuser/soupsieve
  doc_url: https://facelessuser.github.io/soupsieve/

extra:
  recipe-maintainers:
    - jschueller
